<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kuwait Analytics Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="loading-screen" class="loading-screen">
    <div class="spinner"></div>
    <p>Loading your dashboards...</p>
  </div>

  <main id="portal" class="portal hidden">
    <header class="portal-header">
      <div>
        <p class="eyebrow">INTERNAL ANALYTICS</p>
        <h1>Kuwait Analytics Hub</h1>
        <p id="welcome-message" class="welcome-message">Welcome</p>
      </div>
      <button id="logout-button" class="logout-button" type="button">Log out</button>
    </header>

    <section class="toolbar">
      <div>
        <h2>Dashboards</h2>
        <p>Only dashboards assigned to your account are shown.</p>
      </div>
      <input id="dashboard-search" type="search" placeholder="Search dashboards..." aria-label="Search dashboards">
    </section>

    <section id="dashboard-grid" class="dashboard-grid"></section>
    <p id="portal-message" class="portal-message"></p>
  </main>

  <script type="module" src="dashboard.js"></script>
</body>
</html>
