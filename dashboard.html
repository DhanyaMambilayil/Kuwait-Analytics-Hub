<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kuwait Analytics Hub</title>
  <link rel="stylesheet" href="style.css?v=9">
</head>
<body class="app-body">
  <div id="loading-screen" class="loading-screen">
    <div class="spinner"></div>
    <p>Loading your dashboards...</p>
  </div>

  <div id="portal" class="app-shell hidden">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-name">Al Ansari Exchange</div>
        <div class="brand-subtitle">Kuwait Analytics Hub</div>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-category="All" type="button"><span>⌂</span><b>Overview</b></button>
        <button class="nav-item" data-category="Retail" type="button"><span>▣</span><b>Retail</b></button>
        <button class="nav-item" data-category="Wholesale" type="button"><span>⇄</span><b>Wholesale</b></button>
        <button class="nav-item" data-category="Corporate" type="button"><span>▥</span><b>Corporate</b></button>
        <button class="nav-item" data-category="Customers" type="button"><span>♙</span><b>Customer</b></button>
        <button class="nav-item" data-category="Strategy" type="button"><span>◎</span><b>Strategy</b></button>
      </nav>

      <div class="sidebar-footer">
        <button id="logout-button" class="logout-link" type="button"><span>↪</span><b>Logout</b></button>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div>
          <h1>Kuwait Analytics Hub</h1>
          <p>Real-time insights. Smarter decisions.</p>
        </div>

        <div class="user-block">
          <div id="avatar" class="avatar">U</div>
          <div>
            <strong id="user-name">User</strong>
            <span id="user-role">Authorised User</span>
          </div>
        </div>
      </header>

      <section class="content">
        <div class="page-heading">
          <div>
            <h2 id="section-title">All Dashboards</h2>
            <p>Explore and access business dashboards across AAE Kuwait.</p>
          </div>

          <div class="search-wrap">
            <span>⌕</span>
            <input id="dashboard-search" type="search" placeholder="Search dashboards..." aria-label="Search dashboards">
          </div>
        </div>

        <div class="table-card">
          <div class="table-head">
            <div>Dashboard Name</div>
            <div>Category</div>
            <div>Description</div>
            <div>Action</div>
          </div>
          <div id="dashboard-list"></div>
        </div>

        <p id="portal-message" class="portal-message"></p>
      </section>
    </main>
  </div>

  <script type="module" src="dashboard.js?v=8"></script>
</body>
</html>
